<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ooo Trading Cards</title>
    <style>
        :root { 
            --card-gold: #f1c40f; --card-blue: rgba(52, 152, 219, 0.9); 
            --text-dark: #2c3e50; --bmo-green: #7fbfad; --bmo-dark: #3c5e54;
        }
        body { 
            background-color: #2c3e50; background-image: url('https://i.imgur.com/T6KukmD.gif'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0;
            padding-bottom: 150px; /* Space for BMO */
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: -1; }

        /* RECTANGLE HEADER */
        .title-gif-container {
            width: 100%; max-width: 420px; margin-bottom: 50px; border: 8px solid var(--card-gold);
            border-radius: 15px; overflow: hidden; aspect-ratio: 16 / 9; display: flex;
        }
        .title-gif { width: 100%; height: 100%; object-fit: cover; }

        /* CARD STYLES */
        .cards-wrapper { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
        .card-container { width: 300px; height: 420px; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; }
        .card-container:hover .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 12px solid var(--card-gold); box-sizing: border-box; }
        .card-front { background-color: var(--card-blue); display: flex; flex-direction: column; align-items: center; padding: 20px; color: white; }
        .card-image { width: 100%; height: 70%; object-fit: cover; border-radius: 10px; border: 3px solid white; }
        .card-name-front { font-weight: 900; margin-top: 20px; text-transform: uppercase; }
        .card-back { background-color: white; transform: rotateY(180deg); padding: 25px; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--text-dark); font-weight: bold; }
        .hp { color: #e74c3c; }
        .label { font-size: 0.7rem; color: #95a5a6; text-transform: uppercase; margin-top: 15px; font-weight: 800; }
        .val { font-size: 1rem; border-bottom: 1px solid #eee; }
        .ability-box { margin-top: auto; font-size: 0.8rem; background: #f9f9f9; padding: 10px; border-left: 5px solid var(--card-gold); }

        /* BMO PLAYER */
        .bmo-player { position: fixed; bottom: 20px; right: 20px; background: var(--bmo-green); border: 4px solid var(--bmo-dark); border-radius: 15px; padding: 15px; width: 250px; z-index: 1000; }
        .bmo-screen { background: #2c3e50; border-radius: 5px; padding: 10px; color: #bdc3c7; font-size: 0.7rem; text-align: center; margin-bottom: 10px;}
        audio { width: 100%; height: 30px; filter: grayscale(100%) invert(10%); }
    </style>
</head>
<body>
    <div class="title-gif-container">
        <img src="https://i.pinimg.com/originals/b9/4f/98/b94f98f21ed786ac8da859060d79f6f8.gif" class="title-gif">
    </div>

    <div class="cards-wrapper">
        {% for char in characters %}
        <div class="card-container">
            <div class="card-inner">
                <div class="card-front">
                    <img src="/static/{{ char.name.split(' ')[0].lower() }}.png" class="card-image">
                    <div class="card-name-front">{{ char.name }}</div>
                </div>
                <div class="card-back">
                    <div class="header"><span>{{ char.name.split(' ')[0] }}</span><span class="hp">120 HP</span></div>
                    <span class="label">Species</span><span class="val">{{ char.species }}</span>
                    <span class="label">Voice Actor</span><span class="val">{{ char.voice_actor.name if char.voice_actor else "Unknown" }}</span>
                    <div class="ability-box"><strong>Ability:</strong><br>{{ char.ability }}</div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="bmo-player">
        <div class="bmo-screen">
            <div id="status">BMO IDLE...</div>
            <div>Island Song (Ending Theme)</div>
        </div>
        <audio id="exit-song" controls loop>
            <source src="/static/exit-song.mp3" type="audio/mpeg">
        </audio>
    </div>
</body>
</html>
