<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ooo Trading Cards</title>
    <style>
        :root { 
            --card-gold: #f1c40f; 
            --card-blue: rgba(52, 152, 219, 0.9); 
            --text-dark: #2c3e50; 
        }

        body { 
            background-color: #2c3e50; 
            background-image: url('https://i.imgur.com/T6KukmD.gif'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 40px;
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: -1;
        }

        /* HEADER GIF BOX */
        .title-gif-container {
            width: 100%;
            max-width: 500px; 
            margin-bottom: 50px;
            border: 8px solid var(--card-gold);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px var(--card-gold), 0 10px 30px rgba(0,0,0,0.8);
            background: black;
            line-height: 0; /* Removes tiny gap at bottom of image */
        }

        .title-gif {
            width: 100%;
            height: auto;
            display: block;
        }

        .cards-wrapper { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            max-width: 1400px; 
            gap: 30px;
        }

        /* Card Styling */
        .card-container { width: 300px; height: 420px; perspective: 1000px; }
        .card-inner { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform-style: preserve-3d; 
            cursor: pointer; 
        }
        .card-container:hover .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 20px; 
            border: 12px solid var(--card-gold); 
            box-sizing: border-box; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
        }

        .card-front { 
            background-color: var(--card-blue); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            color: white; 
        }
        
        .card-image {
            width: 100%; 
            height: 70%;
            object-fit: cover; 
            object-position: top; 
            image-rendering: pixelated; 
            background: rgba(255,255,255,0.15);
            border: 3px solid white;
            border-radius: 10px;
        }

        .card-name-front { 
            font-weight: 900; 
            margin-top: 20px; 
            font-size: 1.4rem; 
            text-transform: uppercase; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .card-back { 
            background-color: #ffffff; 
            color: var(--text-dark); 
            transform: rotateY(180deg); 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            border-bottom: 3px solid var(--text-dark); 
            padding-bottom: 8px;
            font-size: 1.2rem;
        }

        .hp { color: #e74c3c; }

        .label { 
            font-size: 0.75rem; 
            color: #95a5a6; 
            text-transform: uppercase; 
            margin-top: 18px; 
            font-weight: 800;
        }

        .val { 
            font-size: 1.1rem; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 2px;
            font-weight: 500;
        }

        .ability-box { 
            margin-top: auto; 
            font-size: 0.9rem; 
            line-height: 1.4;
            background: #fdfefe; 
            padding: 12px; 
            border-radius: 10px; 
            border-left: 5px solid var(--card-gold);
        }
    </style>
</head>
<body>

    <div class="title-gif-container">
        <img src="https://i.pinimg.com/originals/b9/4f/98/b94f98f21ed786ac8da859060d79f6f8.gif" 
             alt="Adventure Time Title" 
             class="title-gif">
    </div>

    <div class="cards-wrapper">
        {% for char in characters %}
        <div class="card-container">
            <div class="card-inner">
                <div class="card-front">
                    <img src="/static/{{ char.name.split(' ')[0].lower() }}.png" 
                         alt="{{ char.name }}" 
                         class="card-image"
                         onerror="this.src='https://via.placeholder.com/200x250?text=No+Image'">
                    <div class="card-name-front">{{ char.name }}</div>
                </div>
                
                <div class="card-back">
                    <div class="header">
                        <span>{{ char.name.split(' ')[0] }}</span>
                        <span class="hp">120 HP</span>
                    </div>
                    <span class="label">Species</span>
                    <span class="val">{{ char.species }}</span>
                    <span class="label">Voice Actor</span>
                    <span class="val">{{ char.voice_actor.name if char.voice_actor else "Unknown" }}</span>
                    <div class="ability-box">
                        <strong>Ability:</strong><br>
                        {{ char.ability }}
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
