<!DOCTYPE html>
<html>
<head>
    <title>Ooo Trading Cards</title>
    <style>
        :root { 
            --card-gold: #f1c40f; 
            --card-blue: rgba(52, 152, 219, 0.9); 
            --text-dark: #2c3e50; 
        }

        body { 
            background-color: #2c3e50; 
            /* YOUR IMGUR LINK */
            background-image: url('https://i.imgur.com/T6KukmD.gif'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            padding: 40px;
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: -1;
        }

        .card-container { width: 260px; height: 360px; perspective: 1000px; margin: 20px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .card-container:hover .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; border: 10px solid var(--card-gold); box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .card-front { background-color: var(--card-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .art-placeholder { 
            width: 85%; height: 65%; border: 3px dashed rgba(255,255,255,0.5); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; text-align: center; font-size: 1.3rem;
            background: rgba(255,255,255,0.1);
        }

        .card-back { background-color: #fff; color: var(--text-dark); transform: rotateY(180deg); padding: 20px; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 2px solid var(--text-dark); padding-bottom: 5px; }
        .hp { color: #e74c3c; font-weight: bold; }
        .label { font-size: 0.7rem; color: #7f8c8d; text-transform: uppercase; margin-top: 15px; display: block; font-weight: bold;}
        .val { font-size: 1.1rem; display: block; border-bottom: 1px solid #eee; margin-bottom: 5px; }
        .ability { margin-top: auto; font-size: 0.85rem; font-style: italic; background: #f4f7f6; padding: 10px; border-radius: 8px; border-left: 4px solid var(--card-gold); }
    </style>
</head>
<body>
    {% for char in characters %}
    <div class="card-container">
        <div class="card-inner">
            <div class="card-front">
                <div class="art-placeholder">{{ char.name }}</div>
                <p style="font-size: 0.7rem; letter-spacing: 2px; margin-top: 15px; font-weight: bold;">ADVENTURE TIME TCG</p>
            </div>
            <div class="card-back">
                <div class="header">
                    <span>{{ char.name.split(' ')[0] }}</span>
                    <span class="hp">120 HP</span>
                </div>
                <span class="label">Species</span>
                <span class="val">{{ char.species }}</span>
                <span class="label">Voice Actor</span>
                <span class="val">{{ char.voice_actor.name if char.voice_actor else "Unknown" }}</span>
                <div class="ability">
                    <strong>Ability: Mathematical!</strong><br>
                    Increases party algebraic levels by +15.
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</body>
</html>
