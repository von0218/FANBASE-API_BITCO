<!DOCTYPE html>
<html>
<head>
    <title>Ooo Trading Cards</title>
    <style>
        :root { --card-gold: #f1c40f; --card-blue: #3498db; --text-dark: #2c3e50; }
        body { background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card-container { width: 250px; height: 350px; perspective: 1000px; margin: 15px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; cursor: pointer; }
        .card-container:hover .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; border: 10px solid var(--card-gold); box-sizing: border-box; }
        .card-front { background-color: var(--card-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .card-art-placeholder { width: 80%; height: 60%; background: rgba(255,255,255,0.2); border: 2px dashed white; display: flex; align-items: center; justify-content: center; font-weight: bold; text-align: center; padding: 10px; }
        .card-back { background-color: #fff; color: var(--text-dark); transform: rotateY(180deg); padding: 15px; display: flex; flex-direction: column; }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--text-dark); margin-bottom: 15px; }
        .hp { color: #e74c3c; font-weight: bold; }
        .label { font-weight: bold; text-transform: uppercase; font-size: 0.7rem; color: #7f8c8d; display: block; }
        .value { display: block; margin-bottom: 10px; font-size: 1rem; }
    </style>
</head>
<body>

    {% for char in characters %}
    <div class="card-container">
        <div class="card-inner">
            <div class="card-front">
                <div class="card-art-placeholder">{{ char.name }}</div>
                <p style="font-size: 0.8rem; margin-top: 10px;">ADVENTURE TIME</p>
            </div>
            
            <div class="card-back">
                <div class="card-header">
                    <span style="font-weight: bold;">{{ char.name.split(' ')[0] }}</span>
                    <span class="hp">100 HP</span>
                </div>

                <div class="info-section">
                    <span class="label">Species</span>
                    <span class="value">{{ char.species }}</span>

                    <span class="label">Voice Actor</span>
                    <span class="value">
                        {% if char.voice_actor %}
                            {{ char.voice_actor.name }}
                        {% else %}
                            Unknown
                        {% endif %}
                    </span>
                    
                    <div style="margin-top: 20px; font-size: 0.8rem;">
                        <strong>Ability:</strong> Mathematical! Increases algebraic levels by 10%.
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}

</body>
</html>
