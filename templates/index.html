<!DOCTYPE html>
<html>
<head>
    <title>Ooo Trading Cards</title>
    <style>
        body { background-color: #2c3e50; font-family: 'Segoe UI', sans-serif; display: flex; flex-wrap: wrap; justify-content: center; }
        
        /* The Flip Card Container */
        .card-container {
            width: 250px; height: 350px;
            perspective: 1000px; margin: 20px;
        }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s;
            transform-style: preserve-3d; cursor: pointer;
        }

        .card-container:hover .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 15px;
            border: 8px solid #f1c40f; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        /* Front: Just the Photo */
        .card-front {
            background-color: #3498db;
            display: flex; align-items: center; justify-content: center;
        }
        
        .card-front img { width: 90%; height: 90%; object-fit: contain; }

        /* Back: Info (Pokemon Style) */
        .card-back {
            background-color: white; color: #2c3e50;
            transform: rotateY(180deg); padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        .character-name { font-size: 1.5rem; font-weight: bold; border-bottom: 2px solid #2c3e50; width: 100%; }
        .info-box { margin-top: 50px; text-align: left; width: 100%; }
        .species-tag { font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>

    {% for char in characters %}
    <div class="card-container">
        <div class="card-inner">
            <div class="card-front">
                <img src="/static/images/{{ char.name | replace(' ', '_') }}.png" alt="{{ char.name }}">
            </div>
            
            <div class="card-back">
                <div class="character-name">{{ char.name }}</div>
                <div class="info-box">
                    <p><strong>Species:</strong> <span class="species-tag">{{ char.species }}</span></p>
                    <p><strong>Voice Actor:</strong><br>{{ char.voice_actor.name }}</p>
                </div>
                <div style="margin-top: auto; font-size: 0.8rem;">HP 100</div>
            </div>
        </div>
    </div>
    {% endfor %}

</body>
</html>
