<div class="card-back">
    <div class="header">
        <span>{{ char.name.split(' ')[0] }}</span>
        <span class="hp">120 HP</span>
    </div>
    
    <span class="label">Species</span>
    <span class="val">{{ char.species }}</span>
    
    <span class="label">Voice Actor</span>
    <span class="val">{{ char.voice_actor.name if char.voice_actor else "Unknown" }}</span>
    
    <div class="ability">
        <strong>Ability:</strong><br>
        {{ char.ability }}
    </div>
</div>
